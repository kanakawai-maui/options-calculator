<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <!-- P&L curve path decoration -->
    <linearGradient id="curve-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.6" />
      <stop offset="45%" style="stop-color:#ef4444;stop-opacity:0.6" />
      <stop offset="55%" style="stop-color:#22c55e;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.7" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="473" x2="1200" y2="473" />
    <line x1="300" y1="0" x2="300" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
  </g>

  <!-- Decorative P&L curve -->
  <polyline
    points="80,420 200,410 340,390 460,370 530,315 580,260 640,220 720,200 840,195 980,193 1120,192"
    fill="none"
    stroke="url(#curve-grad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.5"
  />

  <!-- Break-even vertical line -->
  <line x1="540" y1="160" x2="540" y2="500" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" />

  <!-- Zero line -->
  <line x1="80" y1="315" x2="1120" y2="315" stroke="#ffffff" stroke-width="1" opacity="0.15" />

  <!-- Left content block -->
  <!-- Brand pill -->
  <rect x="80" y="80" width="110" height="36" rx="8" fill="url(#accent)" />
  <text x="135" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">OPS</text>

  <!-- Main headline -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="-1">Free Options</text>
  <text x="80" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="-1">Calculator</text>

  <!-- Accent underline -->
  <rect x="80" y="284" width="320" height="4" rx="2" fill="url(#accent)" />

  <!-- Subheadline -->
