  <!-- Feature pills -->
  <rect x="80" y="378" width="130" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4" />
  <text x="145" y="399" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#c4b5fd" text-anchor="middle">Black-Scholes</text>

